name: Public CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Validate translations
        run: npm run lint:messages

      - name: Public copy boundary
        run: npm run qa:public-copy

      - name: Build
        env:
          BETTER_AUTH_SECRET: ci-build-secret-minimum-32-characters
          BETTER_AUTH_URL: http://127.0.0.1:3007
          NEXT_PUBLIC_APP_URL: http://127.0.0.1:3007
        run: npm run build
