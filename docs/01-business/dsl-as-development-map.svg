    <ellipse cx="1020" cy="728" rx="25" ry="9" fill="none" stroke="#0f766e" stroke-width="5"/>
    <path d="M995 728 V754 C995 766 1045 766 1045 754 V728" fill="none" stroke="#0f766e" stroke-width="5"/>
    <path d="M1034 758 L1055 779" stroke="#0f766e" stroke-width="5" stroke-linecap="round"/>
    <text x="1020" y="815" text-anchor="middle" class="cycleLabel">DSLに記録</text>
    <path d="M1068 743 H1144" stroke="#0f766e" stroke-width="7" marker-end="url(#arrowTeal)"/>

    <circle cx="1206" cy="743" r="42" fill="#fff" stroke="#0f766e" stroke-width="2"/>
    <path d="M1186 762 V744 M1206 762 V729 M1226 762 V719" stroke="#0f766e" stroke-width="9"/>
    <text x="1206" y="815" text-anchor="middle" class="cycleLabel">Gap分析</text>
    <path d="M1254 743 H1330" stroke="#0f766e" stroke-width="7" marker-end="url(#arrowTeal)"/>

    <circle cx="1392" cy="743" r="42" fill="#fff" stroke="#f97316" stroke-width="2"/>
    <path d="M1372 721 V771" stroke="#f97316" stroke-width="6" stroke-linecap="round"/>
    <path d="M1375 725 C1392 715 1406 735 1423 724 V752 C1406 763 1392 742 1375 752 Z" fill="#f97316"/>
