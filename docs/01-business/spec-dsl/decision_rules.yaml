version: 0.1.0
last_updated: 2026-06-06
notation: DMN-like YAML

decisions:
  - id: D-001
    name: role_management_allowed
    status: confirmed
    sources:
      - lib/constants/roleHierarchy.ts
    hit_policy: UNIQUE
    inputs: [actor_role, target_role]
    outputs: [allowed]
    rules:
      - when: { actor_role: super_admin, target_role_in: [system_operator, org_admin, auditor, approver, user] }
        then: { allowed: true }
      - when: { actor_role: system_operator, target_role_in: [org_admin, auditor, approver, user] }
        then: { allowed: true }
      - when: { actor_role: org_admin, target_role_in: [auditor, approver, user] }
        then: { allowed: true }
      - otherwise: { allowed: false }

  - id: D-002
    name: task_permission
    status: confirmed
    sources:
      - lib/constants/taskPermissions.ts
    hit_policy: FIRST
    inputs: [action, actor_role]
    outputs: [allowed]
    rules:
      - when: { action_in: [create, edit], actor_role_in: [system_operator, org_admin, approver] }
        then: { allowed: true }
      - when: { action: update_progress, actor_role_in: [system_operator, org_admin, approver, user] }
        then: { allowed: true }
      - otherwise: { allowed: false }

  - id: D-003
    name: document_creation_validation
    status: confirmed
    sources:
      - app/api/documents/route.ts
    hit_policy: FIRST
    inputs: [authenticated, document_present, organization_id, title, status, user_org_matches_document_org]
    outputs: [result, http_status, error]
    rules:
      - when: { authenticated: false }
        then: { result: error, http_status: 401, error: Unauthorized }
      - when: { document_present: false }
        then: { result: error, http_status: 400, error: Missing required fields }
      - when: { organization_id: empty_or_null }
        then: { result: error, http_status: 400, error: Invalid document payload }
      - when: { title: empty_or_blank }
        then: { result: error, http_status: 400, error: Invalid document payload }
      - when: { status_not_in: [draft, in_review, approved, obsolete] }
        then: { result: error, http_status: 400, error: Invalid status }
      - when: { user_org_matches_document_org: false }
        then: { result: error, http_status: 403, error: Organization mismatch }
      - otherwise: { result: ok, http_status: 200 }

  - id: D-004
    name: document_approval_start
    status: confirmed
    sources:
      - lib/services/document.ts
    hit_policy: FIRST
    inputs: [authenticated, document_exists, document_status, step1_approver_id, step2_approver_id, pending_request_exists, same_approver]
    outputs: [result, created_requests, document_next_status, error]
    rules:
      - when: { authenticated: false }
        then: { result: error, error: Not authenticated }
      - when: { document_exists: false }
        then: { result: error, error: 文書が見つかりません }
      - when: { document_status_not: draft }
        then: { result: error, error: 下書き状態の文書のみ承認依頼できます }
      - when: { step1_approver_id: empty_or_null }
        then: { result: error, error: 承認者を選択してください }
      - when: { step2_approver_id: empty_or_null }
        then: { result: error, error: 承認者を選択してください }
      - when: { pending_request_exists: true }
        then: { result: error, error: 承認フローが既に開始されています }
      - when: { same_approver: true }
        then:
          result: ok
          created_requests:
            - { step_number: 1, status: approved }
            - { step_number: 2, status: pending }
          document_next_status: in_review
      - otherwise:
          result: ok
          created_requests:
            - { step_number: 1, status: pending }
            - { step_number: 2, status: pending }
          document_next_status: in_review

  - id: D-005
    name: current_approval_action_allowed
    status: confirmed
    sources:
      - lib/services/document.ts
      - lib/services/incident.ts
      - lib/services/audit.ts
    hit_policy: FIRST
    inputs: [resource_exists, pending_request_exists, approver_matches_actor]
    outputs: [allowed, error]
    rules:
      - when: { resource_exists: false }
        then: { allowed: false, error: 対象が見つかりません }
      - when: { pending_request_exists: false }
        then: { allowed: false, error: 承認対象が見つかりません }
      - when: { approver_matches_actor: false }
        then: { allowed: false, error: 現在の承認ステップではありません }
      - otherwise: { allowed: true }

  - id: D-006
    name: approval_revert_allowed
    status: confirmed
    sources:
      - lib/services/approval.ts
    hit_policy: FIRST
    inputs: [request_exists, same_organization, current_status, reverted_by, approver_id]
    outputs: [allowed, error]
    rules:
      - when: { request_exists: false }
        then: { allowed: false, error: 承認リクエストが見つかりません }
      - when: { same_organization: false }
        then: { allowed: false, error: 組織が一致しません }
      - when: { current_status_not_in: [approved, rejected] }
        then: { allowed: false, error: 差し戻し対象は承認済みまたは却下済みのリクエストのみです }
      - when: { reverted_by_equals_approver_id: true }
        then: { allowed: false, error: 自分が処理した承認を差し戻すことはできません }
      - otherwise: { allowed: true }

  - id: D-007
    name: approval_escalation_target
    status: partially_confirmed
    sources:
      - lib/services/approval.ts
      - app/api/cron/escalate-overdue-approvals/route.ts
    hit_policy: FIRST
    inputs: [execution_path, escalation_rule, organization_users]
    outputs: [target_users]
    rules:
      - when: { execution_path: service, escalation_target_type: user, escalation_user_id: present }
        then: { target_users: [escalation_user_id] }
      - when: { execution_path: service, escalation_target_type: department_manager, department_manager_id: present }
        then: { target_users: [department_manager_id] }
      - when: { execution_path: service, escalation_target_type: role_flag, escalation_role_flag: present }
        then: { target_users: active_users_with_role_flag }
      - when: { execution_path: cron_route }
        then: { target_users: active_users_with_role_in_org_admin_or_system_operator }
      - otherwise: { target_users: [] }

  - id: D-008
    name: ai_risk_analysis_request_validation
    status: confirmed
    sources:
      - app/api/ai/risks/analyze/route.ts
    hit_policy: FIRST
    inputs: [role, body, type, context]
    outputs: [result, http_status, error]
    rules:
      - when: { role_not_in: [org_admin, system_operator, auditor] }
        then: { result: error, http_status: 403, error: Forbidden }
      - when: { body: missing_or_not_object }
        then: { result: error, http_status: 400, error: Request body is required }
      - when: { type: missing }
        then: { result: error, http_status: 400, error: type is required }
      - when: { type_not_in: [identify, evaluate, suggest_treatments] }
        then: { result: error, http_status: 400, error: "Invalid type" }
      - when: { context: missing_or_not_object }
        then: { result: error, http_status: 400, error: context is required }
      - when: { type: identify, context_assetName: missing_or_not_string }
        then: { result: error, http_status: 400, error: context.assetName is required for identify type }
      - when: { type: identify, context_assetType: missing_or_not_string }
        then: { result: error, http_status: 400, error: context.assetType is required for identify type }
      - when: { type_in: [evaluate, suggest_treatments], context_riskName: missing_or_not_string }
        then: { result: error, http_status: 400, error: context.riskName is required }
      - when: { type_in: [evaluate, suggest_treatments], context_riskCategory: missing_or_not_string }
        then: { result: error, http_status: 400, error: context.riskCategory is required }

  - id: D-009
    name: control_soa_approval_start
    status: confirmed
    sources:
      - app/api/controls/route.ts
      - tests/e2e/initial-w02-soa-readiness.spec.ts
    hit_policy: FIRST
    inputs: [authenticated, organization_access, control_exists, soa_status, pending_request_exists]
    outputs: [result, http_status, next_soa_approval_status, error]
    rules:
      - when: { authenticated: false }
        then: { result: error, http_status: 401, error: Unauthorized }
      - when: { organization_access: false }
        then: { result: error, http_status: 403, error: Forbidden }
      - when: { control_exists: false }
        then: { result: error, http_status: 404, error: Control not found }
      - when: { soa_status: not_reviewed }
        then: { result: error, http_status: 400, error: 適用管理策の判断が未完了です }
      - when: { pending_request_exists: true }
        then: { result: error, http_status: 409, error: 適用管理策判断の承認申請がすでに存在します }
      - otherwise: { result: ok, http_status: 200, next_soa_approval_status: submitted }

  - id: D-010
    name: control_soa_version_publish
    status: confirmed
    sources:
      - app/api/controls/route.ts
      - lib/db/drizzle/schema/risks.ts
      - tests/e2e/initial-w02-soa-readiness.spec.ts
    hit_policy: FIRST
    inputs: [authenticated, organization_access, control_count, unreviewed_control_count, submitted_control_count]
    outputs: [result, http_status, next_version_number, error]
    rules:
      - when: { authenticated: false }
        then: { result: error, http_status: 401, error: Unauthorized }
      - when: { organization_access: false }
        then: { result: error, http_status: 403, error: Forbidden }
      - when: { control_count: 0 }
        then: { result: error, http_status: 400, error: No controls to publish }
      - when: { unreviewed_control_count_greater_than: 0 }
        then: { result: error, http_status: 400, error: 適用管理策の判断に未判断の管理策が含まれています }
      - when: { submitted_control_count_greater_than: 0 }
        then: { result: error, http_status: 400, error: 適用管理策の判断に承認待ちの管理策が含まれています }
      - otherwise: { result: ok, http_status: 200 }

unconfirmed_decisions:
  - id: U-D-001
    name: risk_band_thresholds
    reason: risk_score計算は確認済みだが、low/medium/high等の帯判定の正本実装は未確認
  - id: U-D-002
    name: subscription_auto_upgrade
    reason: ビジネス要件には記載があるが、実装済み範囲として追加照合が必要
  - id: U-D-003
    name: approval_responsibility_mapping
    reason: "`approver` はログインロールとして存在し、文書/監査計画/監査報告書/残留リスク受容ではCISO代表承認ルールのQAが通っている。ただし、是正完了、経営判断、多段承認、リスクオーナー/経営層を含む体制ロールとの対応は未整理"
