    <path d="M604 641 V631 M621 641 V626 M638 641 V621" stroke="#0f766e" stroke-width="9"/>
    <text x="680" y="641" class="body">Gap：不足と次アクション</text>
  </g>

  <path d="M1036 450 H1070" stroke="#64748b" stroke-width="8" marker-end="url(#arrowGray)"/>

  <rect x="1072" y="246" width="480" height="407" rx="8" class="card" stroke="#f97316"/>
