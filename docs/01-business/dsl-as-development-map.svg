    <line x1="670" y1="555" x2="1005" y2="555" class="dashTeal"/>
    <rect x="588" y="560" width="66" height="48" rx="6" fill="#ecfeff" stroke="#99f6e4"/>
    <path d="M604 569 H630 L641 580 V599 H604 Z" fill="none" stroke="#0f766e" stroke-width="5"/>
    <path d="M619 591 L626 598 L640 584" fill="none" stroke="#0f766e" stroke-width="5" stroke-linecap="round"/>
    <text x="680" y="594" class="body">Evidence：確認済み証跡</text>
    <line x1="670" y1="616" x2="1005" y2="616" class="dashTeal"/>
