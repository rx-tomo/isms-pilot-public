<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">DSLに落とす理由</title>
  <desc id="desc">コード、人間の理解、AIの作業単位をつなぐ中間表現としてDSLを使う理由を説明する業務用図解。</desc>
  <defs>
    <style>
      .bg { fill: #fbfcfe; }
      .title { font: 800 64px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif; fill: #0f172a; }
      .subtitle { font: 700 30px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif; fill: #1f2937; }
      .bandText { font: 800 34px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif; fill: #111827; }
      .colTitle { font: 800 34px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif; fill: #fff; }
      .body { font: 700 27px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif; fill: #111827; }
      .small { font: 700 23px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif; fill: #111827; }
      .cycleTitle { font: 800 30px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif; fill: #fff; }
      .cycleLabel { font: 800 24px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif; fill: #111827; }
      .conclusion { font: 800 34px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif; fill: #111827; }
      .card { fill: #fff; stroke-width: 2; }
      .dashBlue { stroke: #93c5fd; stroke-width: 2; stroke-dasharray: 4 6; }
      .dashTeal { stroke: #5eead4; stroke-width: 2; stroke-dasharray: 4 6; }
      .dashOrange { stroke: #fdba74; stroke-width: 2; stroke-dasharray: 4 6; }
      .iconBox { fill: #f8fafc; stroke-width: 1.5; }
    </style>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e"/>
    </marker>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <text x="800" y="72" text-anchor="middle" class="title">DSLに落とす理由</text>
  <text x="800" y="120" text-anchor="middle" class="subtitle">コード・人間の理解・AIの作業単位をつなぐ中間表現</text>

  <rect x="48" y="145" width="1504" height="86" rx="8" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="132" cy="188" r="34" fill="#f59e0b"/>
  <path d="M114 177 L126 171 L139 177 L151 171 L151 201 L139 207 L126 201 L114 207 Z" fill="none" stroke="#fff" stroke-width="5" stroke-linejoin="round"/>
  <circle cx="132" cy="169" r="6" fill="#fff"/>
  <text x="200" y="200" class="bandText">DSLは巨大な仕様書ではなく、探索型開発を継続可能にする“更新される地図”</text>

  <rect x="48" y="246" width="475" height="407" rx="8" class="card" stroke="#2563eb"/>
  <rect x="48" y="246" width="475" height="56" rx="8" fill="#2563eb"/>
  <rect x="48" y="292" width="475" height="10" fill="#2563eb"/>
  <text x="286" y="286" text-anchor="middle" class="colTitle">コードから仕様を起こす</text>

  <rect x="70" y="319" width="74" height="66" rx="6" class="iconBox" stroke="#93c5fd"/>
  <circle cx="104" cy="348" r="17" fill="none" stroke="#1d4ed8" stroke-width="5"/>
  <path d="M117 361 L133 377" stroke="#1d4ed8" stroke-width="5" stroke-linecap="round"/>
  <text x="170" y="362" class="small">現行機能を確認</text>
