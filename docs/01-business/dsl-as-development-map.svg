    <path d="M384 743 H460" stroke="#0f766e" stroke-width="7" marker-end="url(#arrowTeal)"/>

    <circle cx="522" cy="743" r="42" fill="#fff" stroke="#2563eb" stroke-width="2"/>
    <path d="M501 719 H530 L543 732 V762 H501 Z" fill="none" stroke="#2563eb" stroke-width="5"/>
    <circle cx="538" cy="755" r="11" fill="none" stroke="#2563eb" stroke-width="5"/>
    <path d="M546 763 L558 775" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>
    <text x="522" y="815" text-anchor="middle" class="cycleLabel">コードから抽出</text>
    <path d="M570 743 H650" stroke="#0f766e" stroke-width="7" marker-end="url(#arrowTeal)"/>

    <rect x="665" y="706" width="210" height="74" rx="7" fill="#fff" stroke="#0f766e" stroke-width="2"/>
    <path d="M722 730 L752 715 L783 730 L813 715 L813 760 L783 775 L752 760 L722 775 Z" fill="none" stroke="#0f766e" stroke-width="5" stroke-linejoin="round"/>
    <circle cx="768" cy="718" r="9" fill="#0f766e"/>
    <text x="770" y="806" text-anchor="middle" font-size="31" font-weight="800" fill="#0f766e">開発の地図</text>
    <path d="M882 743 H958" stroke="#0f766e" stroke-width="7" marker-end="url(#arrowTeal)"/>

