    <rect x="588" y="499" width="66" height="48" rx="6" fill="#ecfeff" stroke="#99f6e4"/>
    <path d="M604 538 V506 M621 538 V506 M638 538 V506" stroke="#0f766e" stroke-width="7" stroke-linecap="round"/>
