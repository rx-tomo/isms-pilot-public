  <rect x="570" y="246" width="455" height="407" rx="8" class="card" stroke="#0f766e"/>
  <rect x="570" y="246" width="455" height="56" rx="8" fill="#0f766e"/>
  <rect x="570" y="292" width="455" height="10" fill="#0f766e"/>
  <text x="798" y="286" text-anchor="middle" class="colTitle">DSLで構造化する</text>
  <g>
    <rect x="588" y="316" width="66" height="48" rx="6" fill="#ecfeff" stroke="#99f6e4"/>
