<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">DSLに落とす理由</title>
  <desc id="desc">コード、人間の理解、AIの作業単位をつなぐ中間表現としてDSLを説明する完成版の業務図解。</desc>
  <defs>
    <style>
      .bg { fill: #f7f8f5; }
      .ink { fill: #1f2933; font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif; }
      .muted { fill: #52606d; font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif; }
      .white { fill: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif; }
      .title { font-size: 62px; font-weight: 850; }
      .subtitle { font-size: 32px; font-weight: 700; }
      .headline { font-size: 31px; font-weight: 820; }
      .section { font-size: 34px; font-weight: 820; }
      .body { font-size: 25px; font-weight: 650; }
      .small { font-size: 22px; font-weight: 620; }
      .tiny { font-size: 18px; font-weight: 600; }
      .panelBlue { fill: #ffffff; stroke: #1f5fbf; stroke-width: 3; }
      .panelTeal { fill: #ffffff; stroke: #087f7b; stroke-width: 3; }
      .panelOrange { fill: #ffffff; stroke: #f47a1f; stroke-width: 3; }
      .bandBlue { fill: #1558bd; }
      .bandTeal { fill: #087f7b; }
      .bandOrange { fill: #f47a1f; }
      .note { fill: #ffffff; stroke: #f3a929; stroke-width: 3; }
      .chipBlue { fill: #eff6ff; stroke: #94b7f0; stroke-width: 2; }
      .chipTeal { fill: #e8f7f4; stroke: #8ccfc8; stroke-width: 2; }
      .chipOrange { fill: #fff4e8; stroke: #f6bb7b; stroke-width: 2; }
      .cycle { fill: #ffffff; stroke: #087f7b; stroke-width: 3; }
      .arrow { stroke: #56616f; stroke-width: 7; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowhead); }
      .arrowTeal { stroke: #087f7b; stroke-width: 8; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowheadTeal); }
      .ruleBlue { stroke: #a9c5f3; stroke-width: 2; stroke-dasharray: 8 8; }
      .ruleTeal { stroke: #8ccfc8; stroke-width: 2; stroke-dasharray: 8 8; }
      .ruleOrange { stroke: #f6bb7b; stroke-width: 2; stroke-dasharray: 8 8; }
      .iconText { font-size: 42px; font-weight: 850; }
    </style>
    <marker id="arrowhead" markerWidth="18" markerHeight="18" refX="14" refY="9" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0 0 L 16 9 L 0 18 z" fill="#56616f" />
    </marker>
    <marker id="arrowheadTeal" markerWidth="18" markerHeight="18" refX="14" refY="9" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0 0 L 16 9 L 0 18 z" fill="#087f7b" />
    </marker>
  </defs>

  <rect class="bg" width="1600" height="1000" />

  <text x="800" y="76" text-anchor="middle" class="ink title">DSLに落とす理由</text>
  <text x="800" y="125" text-anchor="middle" class="ink subtitle">コード・人間の理解・AIの作業単位をつなぐ中間表現</text>

  <rect x="55" y="155" width="1490" height="92" rx="12" class="note" />
  <circle cx="122" cy="201" r="32" fill="#f3a929" />
  <text x="122" y="216" text-anchor="middle" class="white iconText">地</text>
  <text x="830" y="213" text-anchor="middle" class="ink headline">DSLは巨大な仕様書ではなく、探索型開発を継続可能にする「更新される地図」</text>

  <rect x="55" y="270" width="470" height="390" rx="10" class="panelBlue" />
  <path d="M 55 280 Q 55 270 65 270 L 515 270 Q 525 270 525 280 L 525 326 L 55 326 Z" class="bandBlue" />
  <text x="290" y="312" text-anchor="middle" class="white section">コードから仕様を起こす</text>

  <rect x="85" y="352" width="74" height="74" rx="8" class="chipBlue" />
  <text x="122" y="401" text-anchor="middle" class="ink iconText">観</text>
  <text x="190" y="396" class="ink body">現行機能を確認</text>
  <line x1="180" y1="438" x2="495" y2="438" class="ruleBlue" />

  <rect x="85" y="448" width="74" height="74" rx="8" class="chipBlue" />
  <text x="122" y="497" text-anchor="middle" class="ink iconText">振</text>
  <text x="190" y="492" class="ink body">実装済みの振る舞いを把握</text>
  <line x1="180" y1="534" x2="495" y2="534" class="ruleBlue" />

  <rect x="85" y="544" width="74" height="74" rx="8" class="chipBlue" />
  <text x="122" y="593" text-anchor="middle" class="ink iconText">読</text>
  <text x="190" y="588" class="ink body">業務上の意味を読み解く</text>
  <text x="190" y="632" class="muted small">コードだけでは判断が分散しやすい</text>

  <path d="M 540 465 L 575 465" class="arrow" />

  <rect x="595" y="270" width="410" height="390" rx="10" class="panelTeal" />
  <path d="M 595 280 Q 595 270 605 270 L 995 270 Q 1005 270 1005 280 L 1005 326 L 595 326 Z" class="bandTeal" />
  <text x="800" y="312" text-anchor="middle" class="white section">DSLで構造化する</text>

  <rect x="635" y="352" width="62" height="48" rx="8" class="chipTeal" />
  <text x="666" y="385" text-anchor="middle" class="ink small">W</text>
  <text x="720" y="384" class="ink body">Workflow：業務の流れ</text>
  <line x1="705" y1="414" x2="970" y2="414" class="ruleTeal" />

  <rect x="635" y="421" width="62" height="48" rx="8" class="chipTeal" />
  <text x="666" y="454" text-anchor="middle" class="ink small">C</text>
  <text x="720" y="453" class="ink body">CAP：必要能力</text>
  <line x1="705" y1="483" x2="970" y2="483" class="ruleTeal" />

  <rect x="635" y="490" width="62" height="48" rx="8" class="chipTeal" />
  <text x="666" y="523" text-anchor="middle" class="ink small">E</text>
  <text x="720" y="522" class="ink body">Entity：業務データ</text>
  <line x1="705" y1="552" x2="970" y2="552" class="ruleTeal" />

  <rect x="635" y="559" width="62" height="48" rx="8" class="chipTeal" />
  <text x="666" y="592" text-anchor="middle" class="ink small">G</text>
  <text x="720" y="591" class="ink body">Gate：検証条件</text>
  <line x1="705" y1="621" x2="970" y2="621" class="ruleTeal" />

  <text x="720" y="644" class="muted tiny">Evidence / Gap：証跡と不足を記録</text>

  <path d="M 1025 465 L 1060 465" class="arrow" />

  <rect x="1075" y="270" width="470" height="390" rx="10" class="panelOrange" />
  <path d="M 1075 280 Q 1075 270 1085 270 L 1535 270 Q 1545 270 1545 280 L 1545 326 L 1075 326 Z" class="bandOrange" />
  <text x="1310" y="312" text-anchor="middle" class="white section">次の開発に戻す</text>

  <rect x="1105" y="352" width="74" height="74" rx="8" class="chipOrange" />
  <text x="1142" y="401" text-anchor="middle" class="ink iconText">優</text>
  <text x="1210" y="396" class="ink body">実務検証の優先順位を決める</text>
  <line x1="1200" y1="438" x2="1515" y2="438" class="ruleOrange" />

  <rect x="1105" y="448" width="74" height="74" rx="8" class="chipOrange" />
  <text x="1142" y="497" text-anchor="middle" class="ink iconText">小</text>
  <text x="1210" y="492" class="ink body">小さなGoalに分解</text>
  <line x1="1200" y1="534" x2="1515" y2="534" class="ruleOrange" />

  <rect x="1105" y="544" width="74" height="74" rx="8" class="chipOrange" />
  <text x="1142" y="593" text-anchor="middle" class="ink iconText">AI</text>
  <text x="1210" y="588" class="ink body">AIエージェントへ渡しやすい</text>
  <text x="1210" y="632" class="muted small">実装後の差分をDSLへ反映する</text>

  <rect x="55" y="690" width="1490" height="205" rx="12" class="cycle" />
  <rect x="475" y="690" width="650" height="46" rx="10" class="bandTeal" />
  <text x="800" y="724" text-anchor="middle" class="white subtitle">AI支援アジャイル開発での循環</text>

  <circle cx="165" cy="795" r="48" fill="#ffffff" stroke="#1558bd" stroke-width="3" />
  <text x="165" y="810" text-anchor="middle" class="ink iconText">実</text>
  <text x="165" y="867" text-anchor="middle" class="ink small">実装</text>

  <path d="M 220 795 L 295 795" class="arrowTeal" />
  <circle cx="360" cy="795" r="48" fill="#ffffff" stroke="#1558bd" stroke-width="3" />
  <text x="360" y="810" text-anchor="middle" class="ink iconText">確</text>
  <text x="360" y="867" text-anchor="middle" class="ink small">動作確認</text>

  <path d="M 415 795 L 490 795" class="arrowTeal" />
  <circle cx="555" cy="795" r="48" fill="#ffffff" stroke="#1558bd" stroke-width="3" />
  <text x="555" y="810" text-anchor="middle" class="ink iconText">抽</text>
  <text x="555" y="867" text-anchor="middle" class="ink small">コードから抽出</text>

  <path d="M 610 795 L 685 795" class="arrowTeal" />
  <rect x="705" y="746" width="190" height="98" rx="10" fill="#ffffff" stroke="#087f7b" stroke-width="3" />
  <text x="800" y="787" text-anchor="middle" class="ink iconText">地図</text>
  <text x="800" y="829" text-anchor="middle" class="ink small">DSLに記録</text>

  <path d="M 915 795 L 990 795" class="arrowTeal" />
  <circle cx="1055" cy="795" r="48" fill="#ffffff" stroke="#087f7b" stroke-width="3" />
  <text x="1055" y="810" text-anchor="middle" class="ink iconText">差</text>
  <text x="1055" y="867" text-anchor="middle" class="ink small">Gap分析</text>

  <path d="M 1110 795 L 1185 795" class="arrowTeal" />
  <circle cx="1250" cy="795" r="48" fill="#ffffff" stroke="#f47a1f" stroke-width="3" />
  <text x="1250" y="810" text-anchor="middle" class="ink iconText">目</text>
  <text x="1250" y="867" text-anchor="middle" class="ink small">小さなGoal</text>

  <path d="M 1305 795 L 1395 795 L 1395 908 L 110 908 L 110 795 L 117 795" class="arrowTeal" />

  <rect x="55" y="920" width="1490" height="58" rx="10" class="note" />
  <text x="800" y="958" text-anchor="middle" class="ink body">仕様書より構造的、コードより業務寄り。DSLは人間の判断とAIの実装を接続する基準点になる。</text>
</svg>
