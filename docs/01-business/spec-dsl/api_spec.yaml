openapi: 3.1.0
info:
  title: Riscala AI for ISMS Implemented API Specification Draft
  version: 0.1.0
  x-last-updated: 2026-06-08
  description: >
    Next.js API Routeから確認できた代表API契約。全エンドポイント完全網羅ではなく、
    AI/外部システムによる参照・検証の入口として主要業務APIを整理する。
servers:
  - url: /api
security:
  - sessionCookie: []

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: better-auth.session_token
      description: Better Auth session cookie. Cookie名は環境/Better Auth設定で変わる可能性があるため要確認。
    cronSecret:
      type: http
      scheme: bearer
      description: "Authorization: Bearer ${CRON_SECRET}"
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
    CreateDocumentRequest:
      $ref: ./data_schema.json#/$defs/CreateDocumentRequest
    Document:
      $ref: ./data_schema.json#/$defs/Document
    AIRiskAnalyzeRequest:
      $ref: ./data_schema.json#/$defs/AIRiskAnalyzeRequest

paths:
  /controls:
    get:
      operationId: getControls
      tags: [risk_management, controls]
      summary: 管理策一覧/カテゴリ/適用管理策判断の準備状況/判断版履歴の取得
      source_status: confirmed
      sources:
        - app/api/controls/route.ts
        - lib/services/isoControl.ts
        - lib/db/drizzle/schema/risks.ts
      parameters:
        - name: action
          in: query
          required: false
          schema:
            type: string
            enum: [search, categories, soa, soa_versions]
          description: "`soa` は既存の管理策-リスク対応策リンクから適用管理策判断の準備状況を返す。`soa_versions` は固定済み判断版履歴を返す。"
        - name: organizationId
          in: query
          required: true
          schema: { type: string }
        - name: keyword
          in: query
          required: false
          schema: { type: string }
        - name: category
          in: query
          required: false
          schema: { type: string }
      responses:
        '200':
          description: 取得成功。`action=soa` の場合は管理策ごとのリンク済み/未リンク、関連リスク数、対応策数、完了対応策数、適用管理策判断状態、適用/除外理由、判断者、判断日時を返す。`action=soa_versions` の場合は `soa_versions` の版番号、改訂理由、版レビュー状態、スナップショット、件数、発行者、発行日時、前版との差分を返す。
        '400': { description: Missing organizationId / Unsupported action }
        '401': { description: Unauthorized }
        '403': { description: Forbidden }
        '500': { description: Failed to load controls }
    patch:
      operationId: updateControlSoaDecision
      tags: [risk_management, controls]
      summary: 管理策ごとの適用/除外判断を保存
      source_status: confirmed
      sources:
        - app/api/controls/route.ts
        - tests/e2e/initial-w02-soa-readiness.spec.ts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, organizationId, soaStatus]
              properties:
                id: { type: string }
                organizationId: { type: string }
                soaStatus:
                  type: string
                  enum: [not_reviewed, applicable, not_applicable]
                soaApplicabilityReason: { type: string }
                soaExclusionReason: { type: string }
      responses:
        '200': { description: 保存成功。`soa_approval_status` を `draft` に戻し、`control.soa_decision.updated` 監査ログを残す。 }
        '400': { description: Invalid payload }
        '401': { description: Unauthorized }
        '403': { description: Forbidden }
        '404': { description: Control not found }
        '500': { description: Failed to save controls }
    post:
      operationId: handleControlSoaAction
      tags: [risk_management, controls, approvals]
      summary: 管理策ごとの適用管理策判断を承認申請、判断版を発行、または判断版レビューを申請する
      source_status: confirmed
      sources:
        - app/api/controls/route.ts
        - app/api/approvals/route.ts
        - lib/db/drizzle/schema/risks.ts
        - tests/e2e/initial-w02-soa-readiness.spec.ts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action, organizationId]
              properties:
                action:
                  type: string
                  enum: [submit_soa_approval, publish_soa_version]
                id: { type: string, description: iso_controls.id。`submit_soa_approval` の場合は必須。 }
                organizationId: { type: string }
      responses:
        '200': { description: 承認申請、適用管理策判断版の発行、または適用管理策判断版レビュー申請成功。承認申請では `approval_requests.resource_type=iso_control_soa` を作成し、`soa_approval_status=submitted` と `control.soa.approval_requested` 監査ログを残す。版発行では任意の `changeSummary` を受け取り、`soa_versions` に次版番号、改訂理由、スナップショットを作成し、`control.soa.version_published` 監査ログを残す。版レビュー申請では `approval_requests.resource_type=soa_version` を作成し、`soa_versions.review_status=submitted` と `control.soa.version_review_requested` 監査ログを残す。 }
        '400': { description: Invalid payload / 適用管理策の判断が未完了です / No controls to publish / 適用管理策の判断に未判断の管理策が含まれています / 適用管理策の判断に承認待ちの管理策が含まれています }
        '401': { description: Unauthorized }
        '403': { description: Forbidden }
        '404': { description: Control not found }
        '409': { description: 適用管理策判断の承認申請がすでに存在します }
        '500': { description: Failed to submit control applicability approval }

  /risk-treatments/{id}:
    patch:
      operationId: updateRiskTreatment
      tags: [risk_management, approvals]
      summary: リスク対応策更新、または完了済み残留リスク受容の承認申請
      source_status: confirmed
      sources:
        - app/api/risk-treatments/[id]/route.ts
        - app/api/approvals/route.ts
        - tests/e2e/surveillance-residual-risk-acceptance.spec.ts
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  enum: [submit_residual_acceptance_approval]
                  description: 指定時は `treatment_type=accept`、`status=completed`、`residual_review_due_date` 設定済みの対応策を残留リスク受容として承認申請する。
                treatment_description: { type: string }
                responsible_person_id: { type: string }
                target_date: { type: string }
                residual_review_due_date: { type: string }
                status:
                  type: string
                  enum: [planned, in_progress, completed, cancelled]
      responses:
        '200': { description: 更新成功。残留リスク受容の承認申請では `approval_requests.resource_type=risk_residual_acceptance` を作成し、`risk_treatments.residual_approval_status=submitted` と `risk.residual_acceptance.approval_requested` 監査ログを残す。却下済み残留リスク受容を修正した場合は `residual_approval_status=draft` に戻し、却下理由を消し、`risk.residual_acceptance.revised` 監査ログを残す。 }
        '400': { description: Invalid JSON payload / Only accepted residual risk treatments can be submitted / Treatment must be completed before residual acceptance approval / Residual acceptance review due date is required before approval request }
        '401': { description: Unauthorized }
        '403': { description: Forbidden }
        '404': { description: Risk treatment not found }
        '409': { description: Residual risk acceptance approval already submitted or approved / Pending approval request already exists }
        '500': { description: Failed to update risk treatment }

  /documents:
    post:
      operationId: createDocument
      tags: [document_control]
      summary: 文書作成
      source_status: confirmed
      sources:
        - app/api/documents/route.ts
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDocumentRequest'
      responses:
        '200':
          description: 作成成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Document'
        '400':
          description: Invalid JSON payload / Missing required fields / Invalid document payload / Invalid status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
        '403':
          description: Organization mismatch
        '500':
          description: Failed to create document

  /documents/{id}/versions:
    post:
      operationId: createDocumentVersion
      tags: [document_control]
      summary: 文書バージョン作成
      source_status: confirmed
      sources:
        - app/api/documents/[id]/versions/route.ts
        - lib/services/document.ts
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: 作成成功 }
        '401': { description: Unauthorized }
        '404': { description: Not found }
        '500': { description: Internal server error }

  /documents/{id}/export:
    get:
      operationId: exportDocument
      tags: [document_control, export]
      summary: 文書エクスポート
      source_status: confirmed
      sources:
        - app/api/documents/[id]/export/route.ts
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: エクスポート成功 }
        '404': { description: Not found }
        '500': { description: Internal server error }

  /ai/risks/analyze:
    post:
      operationId: analyzeRiskWithAI
      tags: [ai, risk_management]
      summary: AIによるリスク識別・評価・対応案提案
      source_status: confirmed
      sources:
        - app/api/ai/risks/analyze/route.ts
      security:
        - sessionCookie: []
      x-allowed-roles: [org_admin, system_operator, auditor]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIRiskAnalyzeRequest'
      responses:
        '200':
          description: AI分析結果
        '400':
          description: Invalid JSON / validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden by role
        '500':
          description: AI service or unexpected error

  /cron/escalate-overdue-approvals:
    get:
      operationId: escalateOverdueApprovals
      tags: [approval, notification, cron]
      summary: 期限超過承認のエスカレーション
      source_status: confirmed
      sources:
        - app/api/cron/escalate-overdue-approvals/route.ts
      security:
        - cronSecret: []
      responses:
        '200':
          description: 処理件数
          content:
            application/json:
              schema:
                type: object
                required: [processed, skipped, notified]
                properties:
                  processed: { type: integer }
                  skipped: { type: integer }
                  notified: { type: integer }
        '401':
          description: Unauthorized
        '500':
          description: Unexpected error

  /audit/periods:
    get:
      operationId: listAuditPeriods
      tags: [audit_management]
      summary: 監査期間一覧
      source_status: confirmed
      sources:
        - app/api/audit/periods/route.ts
      responses:
        '200': { description: 監査期間一覧 }
    post:
      operationId: createAuditPeriod
      tags: [audit_management]
      summary: 監査期間作成
      source_status: confirmed
      sources:
        - app/api/audit/periods/route.ts
      responses:
        '200': { description: 作成成功 }

  /audit:
    get:
      operationId: getAuditData
      tags: [audit_management]
      summary: 監査計画、統計、不適合一覧の取得
      source_status: confirmed
      sources:
        - app/api/audit/route.ts
        - lib/services/audit.ts
        - tests/e2e/surveillance-first-step.spec.ts
      parameters:
        - name: organizationId
          in: query
          required: true
          schema: { type: string }
        - name: action
          in: query
          required: false
          schema:
            type: string
            enum: [plans, statistics, nonconformities]
        - name: period
          in: query
          required: false
          schema: { type: string }
        - name: status
          in: query
          required: false
          schema: { type: string }
        - name: type
          in: query
          required: false
          schema: { type: string }
      responses:
        '200': { description: 取得成功 }
        '400': { description: Missing organizationId / Unsupported action }
        '401': { description: Unauthorized }
        '403': { description: Forbidden }
        '500': { description: Failed to load audit data }
    post:
      operationId: createAuditMutation
      tags: [audit_management]
      summary: 是正処置の作成
      source_status: confirmed
      sources:
        - app/api/audit/route.ts
        - lib/services/audit.ts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action, correctiveAction]
              properties:
                action:
                  type: string
                  enum: [correctiveAction]
                correctiveAction:
                  type: object
      responses:
        '201': { description: 作成成功 }
        '400': { description: Unsupported action / Invalid corrective action payload }
        '401': { description: Unauthorized }
        '403': { description: Forbidden }
        '404': { description: Nonconformity not found }
        '500': { description: Failed to update audit data }
    patch:
      operationId: updateAuditMutation
      tags: [audit_management]
      summary: 不適合または是正処置の更新
      source_status: confirmed
      sources:
        - app/api/audit/route.ts
        - lib/services/audit.ts
        - tests/e2e/surveillance-corrective-action-update.spec.ts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [resourceType, id, updates]
              properties:
                resourceType:
                  type: string
                  enum: [nonconformity, correctiveAction]
                id:
                  type: string
                updates:
                  type: object
      responses:
        '200': { description: 更新成功 }
        '400': { description: Invalid payload / Unsupported resourceType }
        '401': { description: Unauthorized }
        '403': { description: Forbidden }
        '404': { description: Not found }
        '500': { description: Failed to update audit data }

  /audit/reports/{reportId}/export:
    get:
      operationId: exportAuditReport
      tags: [audit_management, export]
      summary: 監査報告書PDFエクスポート
      source_status: confirmed
      sources:
        - app/api/audit/reports/[reportId]/export/route.ts
      parameters:
        - name: reportId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: PDFエクスポート成功 }
        '404': { description: Not found }
        '500': { description: Internal server error }

  /examination/submission-bundle:
    get:
      operationId: getExaminationSubmissionBundle
      tags: [examination, export, practical_verification]
      summary: 初回登録準備/継続運用フェーズ別の提出束マニフェスト取得
      source_status: confirmed
      sources:
        - app/api/examination/submission-bundle/route.ts
        - tests/e2e/initial-w02-submission-bundle.spec.ts
        - tests/e2e/surveillance-submission-bundle.spec.ts
      parameters:
        - name: organizationId
          in: query
          required: true
          schema: { type: string }
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum: [json, zip, pdf]
      responses:
        '200': { description: 組織の `isms_phase` に応じて、`initial` ではISMS適用範囲、体制・担当者、承認済み文書、情報資産、リスク、適用管理策判断版、初期タスクのready/missingを返す。初期タスクevidenceには親タスク数、サブタスク数、完了数、未完了数、平均進捗を含める。`surveillance` では年次監査計画、監査報告書、不適合・是正、フォローアップ、マネジメントレビュー、残留リスク受容、監査証跡のready/needs_review/missingを返す。いずれも `examination.submission_bundle.generated` 監査ログを残し、`format=zip` の場合はmanifest JSON、summary/items/gaps CSV、summary PDFを含むZIPを返す。`format=pdf` の場合は提出束サマリーPDFを返す。 }
        '400': { description: organizationId is required / Unsupported format }
        '401': { description: Unauthorized }
        '403': { description: Forbidden }
        '404': { description: Organization not found }
        '500': { description: Failed to build examination submission bundle }

  /information-assets/import:
    post:
      operationId: importInformationAssets
      tags: [risk_management, import]
      summary: 情報資産インポート
      source_status: confirmed
      sources:
        - app/api/information-assets/import/route.ts
      responses:
        '200': { description: インポート結果 }

  /information-assets:
    get:
      operationId: listInformationAssets
      tags: [risk_management, asset_management]
      summary: 情報資産一覧
      source_status: confirmed
      sources:
        - app/api/information-assets/route.ts
        - lib/services/informationAsset.ts
        - tests/e2e/initial-w02-journey.spec.ts
      responses:
        '200': { description: 一覧取得成功 }
        '401': { description: Unauthorized }
        '403': { description: Forbidden }
        '500': { description: Failed to load information assets }
    post:
      operationId: createInformationAsset
      tags: [risk_management, asset_management]
      summary: 情報資産作成
      source_status: confirmed
      sources:
        - app/api/information-assets/route.ts
        - tests/e2e/initial-w02-assets-crud.spec.ts
      responses:
        '200': { description: 作成成功 }
        '400': { description: Invalid payload / Missing organization_id }
        '401': { description: Unauthorized }
        '403': { description: Forbidden }
        '500': { description: Failed to create information asset }
    patch:
      operationId: updateInformationAsset
      tags: [risk_management, asset_management]
      summary: 情報資産更新
      source_status: confirmed
      sources:
        - app/api/information-assets/route.ts
        - tests/e2e/initial-w02-assets-crud.spec.ts
      responses:
        '200': { description: 更新成功 }
        '400': { description: Invalid payload / Missing id }
        '401': { description: Unauthorized }
        '403': { description: Forbidden }
        '404': { description: Not found }
        '500': { description: Failed to update information asset }
    delete:
      operationId: deleteInformationAsset
      tags: [risk_management, asset_management]
      summary: 情報資産削除
      source_status: confirmed
      sources:
        - app/api/information-assets/route.ts
        - tests/e2e/initial-w02-assets-crud.spec.ts
      responses:
        '200': { description: 削除成功 }
        '400': { description: Missing id }
        '401': { description: Unauthorized }
        '403': { description: Forbidden }
        '404': { description: Not found }
        '500': { description: Failed to delete information asset }

  /information-assets/export:
    get:
      operationId: exportInformationAssets
      tags: [risk_management, export]
      summary: 情報資産エクスポート
      source_status: confirmed
      sources:
        - app/api/information-assets/export/route.ts
      responses:
        '200': { description: エクスポート成功 }

  /risks:
    post:
      operationId: createRisk
      tags: [risk_management]
      summary: リスク作成
      source_status: confirmed
      sources:
        - app/api/risks/route.ts
        - tests/e2e/initial-w02-risk-create.spec.ts
      notes:
        - 2026-06-05 `qa:initial-w02-risk-create` で、情報資産リンク付き新規リスク作成、対応策作成、管理策リンク、監査ログを確認。
      responses:
        '201': { description: 作成成功 }
        '400': { description: Invalid payload }
        '401': { description: Unauthorized }
        '403': { description: Forbidden }
        '404': { description: Organization / category / user not found }
        '500': { description: Failed to create risk }

  /risks/import:
    post:
      operationId: importRisks
      tags: [risk_management, import]
      summary: リスクインポート
      source_status: confirmed
      sources:
        - app/api/risks/import/route.ts
      responses:
        '200': { description: インポート結果 }

  /risks/export:
    get:
      operationId: exportRisks
      tags: [risk_management, export]
      summary: リスクエクスポート
      source_status: confirmed
      sources:
        - app/api/risks/export/route.ts
      responses:
        '200': { description: エクスポート成功 }

  /stripe/create-checkout-session:
    post:
      operationId: createStripeCheckoutSession
      tags: [billing]
      summary: Stripe Checkoutセッション作成
      source_status: confirmed
      sources:
        - app/api/stripe/create-checkout-session/route.ts
      responses:
        '200': { description: セッション作成成功 }

  /stripe/webhook:
    post:
      operationId: receiveStripeWebhook
      tags: [billing, external_integration]
      summary: Stripe Webhook受信
      source_status: confirmed
      sources:
        - app/api/stripe/webhook/route.ts
      security: []
      responses:
        '200': { description: Webhook処理成功 }
        '400': { description: 署名/ペイロード不正等 }

  /super-admin/organizations:
    get:
      operationId: listOrganizationsForSuperAdmin
      tags: [super_admin]
      summary: テナント一覧
      source_status: confirmed
      sources:
        - app/api/super-admin/organizations/route.ts
      responses:
        '200': { description: テナント一覧 }
    post:
      operationId: createOrganizationForSuperAdmin
      tags: [super_admin]
      summary: テナント作成
      source_status: confirmed
      sources:
        - app/api/super-admin/organizations/route.ts
      responses:
        '200': { description: テナント作成成功 }

  /organizations/{organizationId}/members/department-scopes:
    get:
      operationId: listMemberDepartmentScopes
      tags: [organization, rbac]
      summary: メンバーの部門スコープ取得
      source_status: confirmed
      sources:
        - app/api/organizations/[organizationId]/members/department-scopes/route.ts
        - lib/services/departmentScope.ts
      parameters:
        - name: organizationId
          in: path
          required: true
          schema: { type: string }
        - name: userId
          in: query
          required: true
          schema: { type: string }
      responses:
        '200': { description: 部門スコープ取得成功 }
        '400': { description: Missing userId }
        '401': { description: Unauthorized }
        '403': { description: Forbidden }
    put:
      operationId: updateMemberDepartmentScopes
      tags: [organization, rbac]
      summary: メンバーの部門スコープ更新
