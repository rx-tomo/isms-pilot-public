version: 0.1.0
last_updated: 2026-06-06

policies:
  - id: E-001
    name: common_api_authentication_error
    status: confirmed
    condition: session user is missing
    response:
      http_status: 401
      body: { error: Unauthorized }
    audit_log: not always recorded
    human_confirmation: ログイン状態、セッション期限、権限ロールを確認
    sources:
      - lib/server/auth/routeAuth.ts
      - app/api/documents/route.ts

  - id: E-002
    name: common_invalid_json
    status: confirmed
    condition: request.json() parse fails
    response:
      http_status: 400
      body_examples:
        - { error: Invalid JSON payload }
        - { error: Invalid JSON in request body }
    audit_log: not recorded
    human_confirmation: 呼び出し元のContent-Type、JSON形式、必須項目を確認

  - id: E-003
    name: generic_route_error_handler
    status: confirmed
    condition: handleRouteError receives unknown error
    response:
      http_status: 500
      body: { error: Internal server error }
    logging:
      - console.error("API route error:", error)
    sources:
      - lib/errors/handleRouteError.ts

  - id: E-004
    name: document_approval_not_startable
    status: confirmed
    conditions:
      - document not found
      - document.status != draft
      - approver missing
      - pending approval already exists
    response_style: service throws Error with Japanese message
    audit_log:
      success: document.approval_requested
      failure: not confirmed
    human_confirmation: 文書状態、承認者、既存承認依頼を確認

  - id: E-005
    name: document_rejection_returns_to_draft
    status: confirmed
    condition: current approver rejects document
    system_action:
      - current approval_request -> rejected
      - remaining pending approval_requests -> rejected
      - document.status -> draft
      - approved_by/approved_at -> null
      - audit log document.rejected
    human_confirmation: 却下理由を確認し、作成者が修正して再申請

  - id: E-006
    name: approval_escalation_duplicate_prevention
    status: confirmed
    condition: pending approval is overdue
    skip_condition: approval_event.escalated already exists
    response:
      cron_counters: [processed, skipped, notified]
    human_confirmation: skippedが多い場合、既通知済みかエスカレーション先不在かを確認

  - id: E-007
    name: cron_secret_missing_or_mismatch
    status: confirmed
    condition: CRON_SECRET missing or Authorization header mismatch
    response:
      http_status: 401
      body: { error: Unauthorized }
    human_confirmation: 環境変数、Vercel Cron Authorization headerを確認

  - id: E-008
    name: audit_plan_rejection
    status: confirmed
    condition: approver rejects audit plan
    system_action:
      - approval_request -> rejected
      - audit.plan.rejected audit log
      - audit_plan.status remains unchanged
    human_confirmation: 監査計画を修正して再申請するか判断

  - id: E-009
    name: ai_risk_analysis_validation_error
    status: confirmed
    condition: type/context validation fails
    response:
      http_status: 400
      body: { error: validation_message }
    human_confirmation: 分析種別に応じたcontext必須項目を確認

  - id: E-010
    name: control_soa_approval_not_startable
    status: confirmed
    conditions:
      - 適用管理策の判断が未完了です
      - pending iso_control_soa approval already exists
      - control not found
      - actor has no organization access
    response:
      http_status: 400_or_403_or_404_or_409
      body_examples:
        - { error: 適用管理策の判断が未完了です }
        - { error: 適用管理策判断の承認申請がすでに存在します }
        - { error: Control not found }
        - { error: Forbidden }
    audit_log:
      success: control.soa.approval_requested
      failure: not confirmed
    human_confirmation: 適用管理策判断状態、既存承認依頼、承認者、対象管理策を確認

  - id: E-011
    name: control_soa_version_not_publishable
    status: confirmed
    conditions:
      - no controls exist
      - any control remains not_reviewed
      - any control has submitted applicability approval
      - actor has no organization access
    response:
      http_status: 400_or_403
      body_examples:
        - { error: No controls to publish }
        - { error: 適用管理策の判断に未判断の管理策が含まれています }
        - { error: 適用管理策の判断に承認待ちの管理策が含まれています }
        - { error: Forbidden }
    audit_log:
      success: control.soa.version_published
      failure: not confirmed
    human_confirmation: 未判断管理策、未処理承認、版固定対象テナントを確認

audit_log_guidance:
  confirmed_events:
    document: [document.created, document.approval_requested, document.approved, document.rejected]
    approval_event: [requested, approved, rejected, escalated, reverted]
    audit: [audit.plan.approval_requested, audit.plan.approved, audit.plan.rejected, audit.report.approval_requested, audit.report.approved, audit.report.rejected]
    control: [control.soa_decision.updated, control.soa.approval_requested, control.soa.approved, control.soa.rejected, control.soa.version_published]
    risk: [risk.created, risk.updated, risk.deleted]
    permission: [user.permissions_updated]
  should_include:
    - organization_id
    - user_id or actor_id
    - action or event_type
    - resource_type
    - resource_id
    - changes or payload
    - created_at

unconfirmed:
  - すべての失敗系で監査ログを残す方針かは未確認
  - 通知チャネル配信失敗時の再試行回数・バックオフ仕様は未確認
  - インポート失敗行の画面確認フローは一部未確認
