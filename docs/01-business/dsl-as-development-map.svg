  <path d="M1392 832 H150 V829" fill="none" stroke="#0f766e" stroke-width="7"/>

  <rect x="48" y="835" width="1504" height="52" rx="8" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="126" cy="861" r="24" fill="#f59e0b"/>
  <path d="M113 860 L122 869 L140 850" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="200" y="873" class="conclusion">仕様書より構造的、コードより業務寄り。DSLは人間の判断とAIの実装を接続する。</text>
</svg>
