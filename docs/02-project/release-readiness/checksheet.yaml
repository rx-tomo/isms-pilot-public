metadata:
  title: ISMS Pilot Release Readiness Checksheet
  created: 2026-05-14
  last_updated: 2026-05-14
  author: Codex
  purpose: >
    ISMS Pilotのリリース完成度を工程0から9まで記録し、
    Codexが現状把握、採点、改善候補整理を自律的に進めるためのチェックシート。
  assessment:
    assessed_at: "2026-05-14T23:20:00+09:00"
    mode: goal_5_quality_gate_recovery
    implementation_changed: true
    report: docs/02-project/release-readiness/quality-gate-recovery-report.md
    correction_note: >
      初回評価はUC・既存docs・実装資産ベースの暫定評価であり、
      ISMS新規導入/継続運用/SaaS運営の実務工程起点の評価としては不足があった。
      2026-05-14に工程0/1/2/3/4/5/8/9を補正対象へ加えた。
      Goal 5ではsignup schema、Playwright origin、documents timeout、pricing fallback、
      smoke worker設定を最小修正したが、security high、unit、smoke一部、documents en、
      API/DB tenant isolation否定ケースが残っていたためrelease candidateではなかった。Next 16移行後はsecurity highが解消済みで、W-01〜W-06、本番auth設定、P1 test debtを次に再判定する。
  status_values:
    - not_started
    - in_progress
    - passed
    - failed
    - blocked
  decision_values:
    - pass
    - conditional_pass
    - fail
    - pending_owner_decision
    - not_evaluated

run_policy:
  initial_goal_scope: assessment_only
  implementation_allowed_in_initial_goal: false
  improvement_loop_max_cycles: 2
  stop_after_initial_assessment: true
  stop_after_max_cycles_even_if_below_target: true
  target_score: 90
  required_gate_policy: fail_blocks_release_candidate

phases:
  - phase_id: 0
    phase_name: 正本確定
    objective: 現行実装、DSL、古いdocsの食い違いを整理し、評価対象を確定する。
    planned_checks:
      - docs/01-business/spec-dsl/ の成果物が揃っている
      - docs/02-project/ の古い進捗記述と現行実装の矛盾を洗い出している
      - 現行のAuth、DB、API、主要画面、package scriptsを確認している
      - 評価対象外にする項目を明記している
    input_sources:
      - docs/01-business/spec-dsl/
      - docs/02-project/10_plan-tracking.md
      - docs/02-project/12_uc-checklist.md
      - docs/02-project/archive/13_project-review-2026-01-23.md
      - package.json
      - app/
      - lib/
      - docs/02-project/release-readiness/capability-gap-assessment.md
    evidence:
      - "spec-dsl成果物はREADME/process/decision_rules/data_schema/api_spec/exception_policy/glossary/HTML/PDF/PNGまで存在。"
      - "package.jsonにlint/typecheck/build/unit/e2e/smoke/journey/qa/security/release-readiness scoreが定義済み。"
      - "app/api配下にAI、auth、documents、audit、risks、tasks、super-admin、stripe等のRoute Handlerが存在。"
      - "docs/02-project/archive/13_project-review-2026-01-23.mdはMVP 95%と記載する一方、現在のrelease-readinessではW-01〜W-06が8 passed / 49 failed、本番auth設定未確認、P1 test debtが残る。"
      - "capability-gap-assessment.mdで、初回評価のUC/実装資産ベース採点が過大評価だったことを明記。"
    status: passed
    score:
      max: 5
      actual: 3
      rationale: "評価対象は把握したが、古いdocsの完了主張と現行検証結果の差分が大きく、初回評価の正本性にも補正が必要。"
    issues:
      - severity: p2
        id: RR-001
        summary: "docs上のMVP 95%/UC 100%記載は、2026-05-14時点の検証コマンド結果で再確認されていない。"
    unresolved_items:
      - "docs/02-project/archive/13_project-review-2026-01-23.mdの2026-01-23時点評価を現行状態に更新するかは次回判断。"
    owner_review_needed: false
    decision: conditional_pass
    next_action: "現行検証結果を正として、古い完了率表記は参考情報に落とす。"

  - phase_id: 1
    phase_name: 規格・運用ナレッジ整理
    objective: ISMS運用支援SaaSに必要な能力を外部基準から抽出する。
    planned_checks:
      - ISO/IEC 27001、27002、27005、27017を参照している
      - ISO 19011、ISO 22301を参照している
      - NIST CSF 2.0、IPA、METI、ISMS-ACなどの公開情報を参照している
      - 規格原文の長文引用ではなく、要求カテゴリと確認観点に要約している
      - 参照元URLと確認日を記録している
    input_sources:
      - docs/01-business/requirements.md
      - docs/01-business/isms-process.md
      - docs/01-business/isms-process-detailed.md
      - docs/02-project/release-readiness/isms-operational-workflow-model.md
      - docs/02-project/release-readiness/required-capability-matrix.md
      - 外部標準・公開ガイド
    evidence:
      - "ISO/IEC 27001:2022はISMS要求事項、ISO/IEC 27005:2022は情報セキュリティリスク管理、ISO/IEC 27017:2015はクラウドサービス向け管理策として確認。"
      - "ISO 19011:2018はマネジメントシステム監査指針、ISO 22301:2019はBCMS要求事項として確認。"
      - "NIST CSF 2.0、IPA 情報セキュリティ10大脅威2026、METI サイバーセキュリティ経営ガイドライン、ISMS-AC適合性評価制度を参照。"
      - "docs/01-business/spec-dsl/process.mdはISMSライフサイクル、文書承認、監査承認、AIリスク分析を中粒度に整理済み。"
      - "isms-operational-workflow-model.mdとrequired-capability-matrix.mdを追加し、外部基準を実務ワークフローと必要能力へ展開。"
    external_references:
      - "https://www.iso.org/standard/27001"
      - "https://www.iso.org/standard/80585.html"
      - "https://www.iso.org/standard/43757.html"
      - "https://www.iso.org/standard/70017.html"
      - "https://www.iso.org/standard/75106.html"
      - "https://www.nist.gov/publications/nist-cybersecurity-framework-csf-20"
      - "https://www.ipa.go.jp/security/10threats/index.html"
      - "https://www.meti.go.jp/policy/netsecurity/mng_guide.html"
      - "https://isms.jp/isms/about.html"
    status: passed
    score:
      max: 10
      actual: 5
      rationale: "参照元は確認し、実務ワークフローと必要能力への展開を開始したが、ISO/管理策単位の詳細トレーサビリティは未完成。"
    issues:
      - severity: p2
        id: RR-002
        summary: "外部標準ごとの要求カテゴリと製品機能のトレーサビリティ表が未作成。"
    unresolved_items:
      - "ISO/IEC 27002の管理策レベル、NIST CSF 2.0のGovern/Identify/Protect等と現行機能の対応表。"
      - "IPA 10大脅威2026のAIリスク、サプライチェーン、脆弱性悪用をどの画面/監査観点で扱うか。"
    owner_review_needed: false
    decision: conditional_pass
    next_action: "標準要求マッピングをrelease-readiness配下に追加する。"

  - phase_id: 2
    phase_name: 利用者別ワークフロー定義
    objective: SaaS運営者と顧客テナントの主要業務導線を分けて整理する。
    planned_checks:
      - SaaS運営者のテナント作成、権限付与、契約、監査ログ確認導線を整理している
      - org_adminの初期設定、組織、ユーザー、スコープ設定導線を整理している
      - user/approverの日常運用導線を整理している
      - auditorの監査計画、実施、報告、フォローアップ導線を整理している
      - system_operatorの運用支援導線を整理している
      - 人手確認ポイントとシステム自動処理を分離している
    input_sources:
      - docs/01-business/spec-dsl/process.md
      - docs/02-project/release-readiness/isms-operational-workflow-model.md
      - docs/08-user-manual/
      - docs/05-quality/uc/uc-coverage-matrix.md
    evidence:
      - "UC-01〜UC-10のactor、期待結果、代表コマンドがuc-coverage-matrix.mdに整理済み。"
      - "docs/08-user-manual/配下にcommon、user/approver、auditor、org_admin、super_admin別マニュアルが存在。"
      - "app/[locale]/super-admin/*、settings/*、documents、risks、tasks、audit、notificationsの主要ページが存在。"
      - "process.mdに人手確認ポイントが記載されている。"
      - "isms-operational-workflow-model.mdでW-01〜W-06を追加し、入力/作業/出力/通過条件を定義。"
    status: passed
    score:
      max: 10
      actual: 5
      rationale: "UCとロール別資料は素材として有効だが、実務工程に対する一気通貫の導線確認と通過条件の証跡が不足。"
    issues:
      - severity: p2
        id: RR-003
        summary: "UC-01〜UC-10は工程2の素材に留まり、ISMS実務ワークフローの通過条件を満たす証跡としては不足。"
    unresolved_items:
      - "W-01〜W-06をブラウザまたは手動証跡で再確認する必要がある。"
      - "super_admin/system_operatorの本番運用導線をデモ環境で再確認する必要がある。"
    owner_review_needed: false
    decision: conditional_pass
    next_action: "Playwrightブラウザ導入後にUC代表ジャーニーを再実行する。"

  - phase_id: 3
    phase_name: 機能充足ギャップ分析
    objective: 必要機能と実装済み機能を照合し、過不足を分類する。
    planned_checks:
      - 文書、承認、資産、リスク、管理策、タスク、監査、証跡、通知、エクスポートを照合している
      - テナント管理、契約/プラン、サポート調査、データ運用を照合している
      - 実装確認済み、docsのみ確認、未確認、未実装を分けている
      - P0/P1/P2/P3の優先度を付けている
    input_sources:
      - docs/01-business/spec-dsl/data_schema.json
      - docs/01-business/spec-dsl/api_spec.yaml
      - docs/02-project/release-readiness/required-capability-matrix.md
      - docs/02-project/release-readiness/capability-gap-assessment.md
      - app/
      - lib/
      - scripts/
      - tests/
    evidence:
      - "app/apiにdocuments、risks、tasks、audit、notifications、stripe、super-admin、export/import、AI関連Route Handlerが存在。"
      - "lib/servicesにdocument/approval/audit/risk/task/notification/stripe/superAdmin/aiRiskAssessmentが存在。"
      - "tests/unitとtests/e2e/journeysに主要機能テスト資産が存在。"
      - "api_spec.yamlは代表APIのみで、全エンドポイント完全網羅ではないと明記。"
      - "capability-gap-assessment.mdでCAP-01〜CAP-24を実装済み/docsのみ/未検証/不足/判断待ちへ分類。"
    status: passed
    score:
      max: 15
      actual: 6
      rationale: "主要機能の実装資産は広いが、必要能力起点では未検証、判断待ち、不足が多く、初回評価は過大だった。"
    issues:
      - severity: p1
        id: RR-004
        summary: "Unit testがtsconfig.tests.jsonのビルド段階で失敗しており、AI settings/document repository系のテスト資産が現行型に追従していない。"
      - severity: p2
        id: RR-005
        summary: "api_spec.yamlが代表APIに限定され、BCP/education/management-reviews/suppliers等の拡張領域は未評価。"
      - severity: p1
        id: RR-015
        summary: "CAP-01〜CAP-24のうち、必須能力の多くが最新動作証跡未取得または未検証。"
    unresolved_items:
      - "document_approvalsとapproval_requestsの境界。"
      - "課金プラン上限、自動アップグレード、契約終了時データ保持の実装完了範囲。"
      - "AI実API連携、キャッシュ、プライバシーフィルタのE2E確認。"
    owner_review_needed: false
    decision: conditional_pass
    next_action: "Unit testの型追従とAPI網羅表の拡張を優先する。"

  - phase_id: 4
    phase_name: 業務ルール検証
    objective: 判断条件、状態遷移、例外処理、人手確認条件を検証する。
    planned_checks:
      - 承認、却下、差戻し、期限超過の状態遷移を確認している
      - 権限拒否、入力不備、外部連携失敗、再処理条件を確認している
      - DMN相当の判断表で確認できる粒度になっている
      - 人手確認へ戻す条件が明確である
    input_sources:
      - docs/01-business/spec-dsl/decision_rules.yaml
      - docs/01-business/spec-dsl/exception_policy.yaml
      - docs/02-project/release-readiness/isms-operational-workflow-model.md
      - lib/services/
      - app/api/
    evidence:
      - "decision_rules.yamlにロール管理、タスク権限、文書作成、文書承認、承認差戻し、AIリスク分析バリデーションを記録。"
      - "exception_policy.yamlに401/400/500、承認不可、却下、cron secret、AI入力不備などを記録。"
      - "lib/services/approval.tsでpending/approved/rejected/reverted/escalatedと期限超過エスカレーションを確認。"
      - "app/api/documents/route.tsで認証、organization mismatch、status validation、document.created audit logを確認。"
      - "ただしW-01〜W-06の各工程に対する例外復帰、監査ログ、人手確認条件の網羅確認は未実施。"
    status: passed
    score:
      max: 10
      actual: 5
      rationale: "代表ルールは確認できたが、再定義した実務工程に沿う例外復帰・監査ログ・人手確認条件の確認が不足。"
    issues:
      - severity: p2
        id: RR-006
        summary: "全失敗系で監査ログを残す方針か未確認。"
      - severity: p2
        id: RR-007
        summary: "通知チャネル配信失敗時の再試行回数・バックオフ仕様が未確認。"
    unresolved_items:
      - "承認UIとAPI/サービス層の権限チェック完全一致。"
      - "監査計画のdraft/planning表現差分の最終整理。"
    owner_review_needed: false
    decision: conditional_pass
    next_action: "失敗系監査ログと外部連携再試行をセキュリティ/業務ルール観点で棚卸しする。"

  - phase_id: 5
    phase_name: 効率性レビュー
    objective: ISMS導入・月次運用・監査準備が実務上効率的に進められるか確認する。
    planned_checks:
      - 初回導入で次に何をすべきか分かる
      - テンプレート、サンプル、CSVインポート、エクスポートが利用できる
      - 通知、リマインド、承認キュー、ダッシュボードが運用負荷を下げている
      - 監査準備に必要な証跡を探しやすい
      - AI機能は人手確認と監査ログ前提で使える
    input_sources:
      - docs/08-user-manual/
      - docs/06-operations/
      - docs/02-project/release-readiness/operational-efficiency-review.md
      - app/
      - docs/mockups/
    evidence:
      - "ホーム、設定、文書テンプレート、資産、管理策、通知、監査、super-adminページが存在。"
      - "docs/06-operationsにdocument-export、information-asset-import、notifications、super-admin-runbook等が存在。"
      - "buildで166 static pages生成まで完了し、主要ページはビルド対象に含まれた。"
      - "localhost QAは/jaおよびdocumentsページでtimeoutしたため、実画面効率は未確認。"
      - "operational-efficiency-review.mdで、ページ/docs存在ではなく実務効率で評価する観点へ補正。"
    status: failed
    score:
      max: 10
      actual: 3
      rationale: "効率化機能候補は豊富だが、初回導入/月次運用/監査準備/SaaS運営の操作効率を確認できていない。"
    issues:
      - severity: p2
        id: RR-008
        summary: "dev server起動後もHTTP HEAD/QA documentsがtimeoutし、ローカル画面応答性を確認できなかった。"
      - severity: p2
        id: RR-009
        summary: "AI支援が人手確認・監査ログ前提で実運用できるかはE2E未確認。"
    unresolved_items:
      - "初回導入から監査準備までの一気通貫操作時間と迷いポイント。"
      - "ユーザーマニュアルのcoming-soon/スクリーンショット不足の現行数。"
    owner_review_needed: false
    decision: fail
    next_action: "localhost timeoutの原因を切り分け、主要画面の手動/自動スモークを再取得する。"

  - phase_id: 6
    phase_name: 品質検証
    objective: 実装が正しく動作することをコマンドと証跡で確認する。
    planned_checks:
      - npm run lint を確認している
      - npm run typecheck を確認している
      - npm run build を確認している
      - npm run test:unit を確認している
      - npm run test:e2e:smoke または主要E2Eを確認している
      - npm run test:journey を確認している、または未実行理由を記録している
      - npm run qa:all または該当QAを確認している
    input_sources:
      - package.json
      - tests/
      - scripts/
      - test-results/
    evidence:
      - "npm run typecheck: passed。"
      - "npm run lint: passed with react-hooks/exhaustive-deps warnings in 7 files。"
      - "npm run build: passed; BetterAuth default secret warning、SQLite WAL SQLITE_BUSY warning、dynamic server usage warningsあり。"
      - "npm run test:unit: initial failure was TS build mismatch; Cycle 2でAI settings/usage/document repositoryテストを現行型へ追従し、test:unit:buildは通過。"
      - "2026-05-15 Goal 6 `npm run test:unit`: 1646 tests / 1646 pass。webhook-delivery.test.tsとai-suggestion-repository.test.tsはrunner/旧mock debtとして一時除外。"
      - "2026-05-15 Goal 6 `npm run qa:rbac:matrix`: 34 passed。settings/users/assets/controlsの非管理者拒否とpayload override拒否を維持。"
      - "2026-05-15 Goal 6 `npm run test:e2e:smoke -- --reporter=line`: 34 passed。Chromium/WebKitのpricing/dev-login/home不安定を復旧。"
      - "2026-05-15 Goal 6 `npm run qa:documents`: 6/6 passed。ja/en documents routesがHTTP 200かつ期待文言あり。"
      - "2026-05-15 Goal 6 `npx playwright test tests/e2e/tenant-api-isolation.spec.ts --project=chromium --reporter=line`: 2 passed。"
      - "2026-05-15 Next 16後 `npm run qa:security`: passed。critical 0 / high 0 / moderate 6 / low 10 / total 16、OSV findings 0。"
      - "2026-05-15 initial `npx playwright test tests/e2e/journeys --project=chromium --reporter=line`: 57/57 failed。`/api/dev/login`, `/ja`, `/api/auth/get-session`, `/api/documents`などの共通JSON.parse failureで停止。"
      - "2026-05-15 `.next` cleanup後、`messages/ja.json`/`messages/en.json` JSON.parse pass、`/api/dev/login`、`/ja`、cookie付き`/api/auth/get-session`、`/ja/settings/organization`、`/ja/super-admin/organizations`は200。SO-01/SA-01はrole setupと初期route renderingを越えた。"
      - "2026-05-15 full Chromium journey suite rerun: 8 passed / 49 failed。共通JSON blockerではなく、super-admin API/test-contract、risk/task select data、invite token、toast、client/server boundary等の個別gapに分解された。"
    status: partial
    score:
      max: 15
      actual: 13
      rationale: "typecheck、unit、RBAC matrix、smoke、documents、主要tenant isolation否定ケース、security high gate、dev login/初期routeは復旧した。ただしunit runner一時除外のtest debtに加え、W-01〜W-06 journey suiteは8/57 passに留まり、主要業務ジャーニーは未成立。"
    issues:
      - severity: p1
        id: RR-004
        summary: "Unit testは復旧したが、webhook-delivery.test.tsとai-suggestion-repository.test.tsをrunnerから一時除外している。"
      - severity: p1
        id: RR-010
        summary: "E2E smokeは34 passedへ復旧し、JSON blockerも代表API/routeでは解消したが、W-01〜W-06の業務ジャーニー検証は8 passed / 49 failed。"
      - severity: p1
        id: RR-016
        summary: "journey失敗はsuper-admin API/test-contract、risk/task select data、invite token、toast、client/server boundary等の個別gapへ分解された。"
      - severity: p2
        id: RR-011
        summary: "buildは成功したがBetterAuth default secret、SQLite lock、dynamic server usage warningが出ている。"
      - severity: p2
        id: RR-008
        summary: "documents CLI QAは復旧したが、実務上の版・承認・証跡探索はジャーニー検証待ち。"
    unresolved_items:
      - "test:journeyは2026-05-15にChromiumで再実行し、8 passed / 49 failed。"
      - "qa:allは未実行。代表QAとsecurity high gate、dev login/初期routeは復旧済みだが、W-01〜W-06は個別implementation/test-contract gapsにより未成立。"
    owner_review_needed: false
    decision: fail
    next_action: "W-01/W-02に影響が大きいsuper-admin API/test-contractまたはorg settings client/server boundaryから1つ選び、代表journeyをさらに進める。"

  - phase_id: 7
    phase_name: セキュリティ検証
