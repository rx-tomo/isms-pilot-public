  <path d="M100 531 H114 M101 518 H113 M107 491 V486" stroke="#1d4ed8" stroke-width="4" stroke-linecap="round"/>
  <text x="170" y="522" class="small">業務上の意味を読み解く</text>
  <line x1="158" y1="550" x2="500" y2="550" class="dashBlue"/>

  <rect x="70" y="559" width="74" height="66" rx="6" class="iconBox" stroke="#93c5fd"/>
  <circle cx="92" cy="593" r="8" fill="#1d4ed8"/>
  <circle cx="122" cy="578" r="8" fill="#1d4ed8"/>
  <circle cx="123" cy="610" r="8" fill="#1d4ed8"/>
  <path d="M99 589 L115 581 M99 597 L116 606" stroke="#1d4ed8" stroke-width="5" stroke-linecap="round"/>
  <text x="170" y="602" class="small">情報の散在を整理</text>

