  <rect x="70" y="399" width="74" height="66" rx="6" class="iconBox" stroke="#93c5fd"/>
  <path d="M91 414 H119 L133 428 V450 H91 Z" fill="none" stroke="#1d4ed8" stroke-width="5" stroke-linejoin="round"/>
