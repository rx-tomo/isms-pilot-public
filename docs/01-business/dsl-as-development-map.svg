  <path d="M1133 523 V512 M1122 552 L1115 560 M1144 552 L1151 560" stroke="#f97316" stroke-width="5" stroke-linecap="round"/>
  <text x="1196" y="540" class="small">AIエージェントへ渡しやすい</text>
  <line x1="1184" y1="570" x2="1524" y2="570" class="dashOrange"/>

  <rect x="1096" y="588" width="74" height="48" rx="6" class="iconBox" stroke="#fdba74"/>
  <path d="M1114 610 C1120 597 1139 596 1148 606 M1152 624 C1145 637 1126 638 1117 628" fill="none" stroke="#f97316" stroke-width="6" stroke-linecap="round"/>
  <path d="M1147 596 V607 H1158 M1118 638 V627 H1107" fill="none" stroke="#f97316" stroke-width="5" stroke-linecap="round"/>
  <text x="1196" y="622" class="small">実装後にDSLへ反映</text>

  <rect x="48" y="670" width="1504" height="148" rx="8" fill="#f8ffff" stroke="#0f766e" stroke-width="2"/>
  <rect x="478" y="676" width="644" height="38" rx="6" fill="#0f766e"/>
  <text x="800" y="704" text-anchor="middle" class="cycleTitle">アジャイル × コーディングエージェントでの循環</text>

  <g>
    <circle cx="150" cy="743" r="42" fill="#fff" stroke="#2563eb" stroke-width="2"/>
